{% extends "base.html" %}
{% block title %}自动化解题 Agent — 首页{% endblock %}

{% block content %}
<section class="upload-section">
  <div class="card" id="dropZone">
    <div class="drop-zone" id="dropArea">
      <div class="drop-icon">📁</div>
      <p class="drop-title">点击上传 / 拖拽图片到此处</p>
      <p class="drop-hint">或直接 <kbd>Ctrl+V</kbd> 粘贴截图 • 支持 PNG / JPG / WebP</p>
      <input type="file" id="fileInput" multiple accept="image/*" hidden>
    </div>
    <div class="preview-area" id="previewArea" hidden>
      <div class="preview-header">
        <span id="previewCount">0 张图片</span>
        <button class="btn-ghost btn-sm" id="clearBtn">清除全部</button>
      </div>
      <div class="preview-list" id="previewList"></div>
    </div>
    <div class="upload-actions">
      <button class="btn btn-primary btn-lg" id="solveBtn" disabled>开始解答</button>
    </div>
  </div>
</section>

<section class="tasks-section" id="tasksSection" hidden>
  <h2 class="section-title">进行中的任务</h2>
  <div class="tasks-list" id="tasksList">
    <!-- 任务卡片由 JS 动态生成 -->
  </div>
</section>

<!-- 算法动画面板 -->
<div class="anim-overlay" id="animOverlay" hidden>
  <div class="anim-panel">
    <div class="anim-header">
      <h3 class="anim-title">算法动画演示</h3>
      <span class="anim-step-counter" id="animStepCounter"></span>
      <button class="anim-close-btn" id="animCloseBtn">&times;</button>
    </div>
    <div class="anim-body">
      <div class="anim-canvas-wrap" id="animCanvasWrap">
        <canvas id="animCanvas"></canvas>
      </div>
      <div class="anim-empty" id="animEmpty">
        <p>点击 <strong>播放</strong> 开始算法动画演示</p>
        <p class="text-sm">支持冒泡排序、快速排序、双指针等常见数组算法的可视化</p>
      </div>
    </div>
    <div class="anim-controls">
      <div class="anim-ctrl-group">
        <button class="btn btn-sm" id="animResetBtn" title="重置">⟳ 重置</button>
        <button class="btn btn-sm" id="animPrevBtn" title="上一步">◀</button>
        <button class="btn btn-sm btn-primary" id="animPlayBtn" title="播放/暂停">▶ 播放</button>
        <button class="btn btn-sm" id="animNextBtn" title="下一步">▶</button>
      </div>
      <div class="anim-speed-control">
        <label for="animSpeed">速度</label>
        <input type="range" id="animSpeed" min="0.5" max="5" step="0.5" value="1">
        <span class="anim-speed-val" id="animSpeedVal">1x</span>
      </div>
    </div>
  </div>
</div>

<!-- 图片放大灯箱 -->
<div class="lightbox" id="lightbox" hidden>
  <div class="lightbox-bg" id="lightboxBg"></div>
  <div class="lightbox-body">
    <button class="lightbox-close" id="lightboxClose">&times;</button>
    <button class="lightbox-prev" id="lightboxPrev">&lsaquo;</button>
    <button class="lightbox-next" id="lightboxNext">&rsaquo;</button>
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
    <div class="lightbox-counter" id="lightboxCounter"></div>
  </div>
</div>

<!-- 手机扫码弹窗 -->
<div class="qr-overlay" id="qrOverlay" hidden>
  <div class="qr-card">
    <h3>手机扫码访问</h3>
    <img id="qrImage" src="/api/qrcode" alt="QR Code">
    <p class="text-sm" id="qrUrl"></p>
    <button class="btn btn-ghost btn-sm" id="qrCloseBtn">关闭</button>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/app.js"></script>
{% endblock %}
